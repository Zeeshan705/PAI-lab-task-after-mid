<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Assistant — Enterprise Local Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --card: #f0f2f5;
    --border: #e0e2e7;
    --accent: #0084d0;
    --accent2: #6c63ff;
    --text: #1a1a1a;
    --muted: #8a8a99;
    --user-bubble: #0084d0;
    --ai-bubble: #e8f0f8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(108,99,255,0.04) 0%, transparent 70%);
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40%;
    right: -20%;
    width: 55vw;
    height: 55vw;
    background: radial-gradient(circle, rgba(0,132,208,0.03) 0%, transparent 70%);
    pointer-events: none;
    animation: drift 16s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(5%, 5%); }
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(248,249,250,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: white;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: default;
    transition: all 0.3s;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; animation: pulse 2s infinite; }
  .status-dot.offline { background: #ef4444; }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.5; }
  }

  .privacy-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(0,132,208,0.08);
    border: 1px solid rgba(0,132,208,0.2);
    padding: 5px 12px;
    border-radius: 100px;
  }

  /* Chat area */
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 1;
    position: relative;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 24px;
    padding: 60px 20px;
    animation: fadeUp 0.6s ease;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .welcome-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(0,132,208,0.15));
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
  }

  .welcome h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.2;
  }
  .welcome h1 span { color: var(--accent); }

  .welcome p {
    font-size: 15px;
    color: var(--muted);
    max-width: 400px;
    line-height: 1.7;
    font-weight: 400;
  }

  .features {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .feature-chip {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 14px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    animation: fadeUp 0.3s ease;
  }

  .message.user { justify-content: flex-end; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
  }
  .avatar.user-av {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.75;
    max-width: calc(100% - 50px);
    font-weight: 400;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #0084d0, #0084d0);
    border: 1px solid #0084d0;
    border-radius: 16px 4px 16px 16px;
    color: #ffffff;
  }

  .message.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    color: var(--text);
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 18px;
  }
  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity:0.4; }
    30% { transform: translateY(-6px); opacity:1; }
  }

  /* Input area */
  .input-area {
    padding: 20px 32px 28px;
    border-top: 1px solid var(--border);
    background: rgba(248,249,250,0.95);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 12px 12px 18px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,132,208,0.5);
    box-shadow: 0 0 0 3px rgba(0,132,208,0.07);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14.5px;
    resize: none;
    max-height: 150px;
    line-height: 1.6;
    font-weight: 400;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #send-btn:hover { transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 18px; height: 18px; fill: #ffffff; }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Error toast */
  #error-toast {
    display: none;
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #dc2626;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 100;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Private<span>AI</span></div>
  </div>

  <div class="status-badge" id="status-badge">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Checking...</span>
  </div>

  <div class="privacy-tag">
    🔒 100% Local
  </div>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome-screen">
    <div class="welcome-icon">✦</div>
    <h1>Your <span>Private</span> AI Assistant</h1>
    <p>Everything runs on your laptop. No data goes to the cloud. No tracking. Pure local intelligence.</p>
    <div class="features">
      <div class="feature-chip">⚡ Offline ready</div>
      <div class="feature-chip">🔐 Zero data leaks</div>
      <div class="feature-chip">🤖 Mistral 7B</div>
      <div class="feature-chip">🐍 Flask backend</div>
    </div>
  </div>
</div>

<div id="error-toast"></div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="Ask me anything... everything stays local 🔒" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line · Runs on your machine only</div>
</div>

<script>
const chatContainer = document.getElementById('chat-container');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeScreen = document.getElementById('welcome-screen');

// Auto-resize textarea
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
});

// Enter to send
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Check Ollama status
async function checkStatus() {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    if (data.online) {
      dot.className = 'status-dot online';
      const model = data.models.find(m => m.includes('mistral')) || data.models[0];
      text.textContent = model ? model.split(':')[0] + ' ready' : 'Ollama online';
    } else {
      dot.className = 'status-dot offline';
      text.textContent = 'Ollama offline';
    }
  } catch {
    dot.className = 'status-dot offline';
    text.textContent = 'Cannot connect';
  }
}

function showError(msg) {
  const toast = document.getElementById('error-toast');
  toast.textContent = '⚠ ' + msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 4000);
}

function addMessage(role, text) {
  if (welcomeScreen) welcomeScreen.style.display = 'none';

  const msg = document.createElement('div');
  msg.className = `message ${role}`;

  if (role === 'ai') {
    msg.innerHTML = `
      <div class="avatar ai">✦</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
  } else {
    msg.innerHTML = `
      <div class="bubble">${escapeHtml(text)}</div>
      <div class="avatar user-av">👤</div>
    `;
  }

  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  return msg;
}

function addTyping() {
  if (welcomeScreen) welcomeScreen.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'message ai';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="avatar ai">✦</div>
    <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  addMessage('user', text);
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;
  addTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    removeTyping();

    if (response.ok) {
      addMessage('ai', data.response);
    } else {
      showError(data.error || 'Something went wrong');
    }
  } catch (err) {
    removeTyping();
    showError('Unable to connect to the server');
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

checkStatus();
setInterval(checkStatus, 15000);
</script>
</body>
</html>
